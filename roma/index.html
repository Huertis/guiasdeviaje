          <div class="place-card__name">📍 ${esc(p.name)}</div>
          ${p.review ? `<p class="place-card__review">${esc(p.review)}</p>` : ''}
          <div class="place-card__meta">
            ${p.hours ? `<div class="place-card__meta-item"><span class="place-card__meta-label">🕐</span> ${esc(p.hours)}</div>` : ''}
            ${p.price ? `<div class="place-card__meta-item"><span class="place-card__meta-label">💶</span> ${esc(p.price)}</div>` : ''}
            ${p.tips ? `<div class="place-card__meta-item"><span class="place-card__meta-label">💡</span> ${esc(p.tips)}</div>` : ''}
          </div>
          <div class="place-card__actions">
            <a class="btn btn--primary btn--sm" href="${gmaps}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg>
              Google Maps
            </a>
            <a class="btn btn--ghost btn--sm" href="${waze}" target="_blank" rel="noopener">Waze</a>
            <a class="btn btn--ghost btn--sm" href="${waShare}" target="_blank" rel="noopener">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-1 1.1-.2.2-.4.2-.7.1-.3-.1-1.2-.4-2.3-1.4-.8-.7-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.4.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5 0-.1-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5-.2 0-.4 0-.6 0-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4 0 1.4 1 2.8 1.1 3 .1.2 2 3.1 4.9 4.3 2.9 1.2 2.9.8 3.4.8.5-.1 1.7-.7 1.9-1.3.2-.7.2-1.2.2-1.3-.1-.1-.2-.2-.5-.3zM12 2a10 10 0 0 0-8.7 14.9L2 22l5.3-1.4A10 10 0 1 0 12 2z"/></svg>
              WhatsApp
            </a>
          </div>
        </div>`;
    }).join('');

    const restaurantsHTML = (d.restaurants || []).length ? `
      <h3 class="section-title section-title--small">🍽 Dónde comer</h3>
      <div class="restaurants">
        ${(d.restaurants || []).map(r => `
          <div class="rest-card">
            <div class="rest-card__head">
              <span class="rest-card__name">${esc(r.name)}</span>
              ${r.price_range ? `<span class="rest-card__price">${esc(r.price_range)}</span>` : ''}
            </div>
            ${r.speciality ? `<div class="rest-card__spec">${esc(r.speciality)}</div>` : ''}
            ${r.meal ? `<span class="rest-card__meal">${esc(r.meal)}${r.reservation_required ? ' · reserva' : ''}</span>` : ''}
          </div>`).join('')}
      </div>` : '';

    const alt = d.alternative_plans || {};
    const altHTML = (alt.more_time || alt.less_time || alt.rainy_day || alt.with_kids) ? `
      <h3 class="section-title section-title--small">🔀 Planes alternativos</h3>
      <div class="alt-plans">
        ${alt.more_time ? `<div class="alt-plan"><div class="alt-plan__label">Si tienes más tiempo</div><div class="alt-plan__text">${esc(alt.more_time)}</div></div>` : ''}
        ${alt.less_time ? `<div class="alt-plan"><div class="alt-plan__label">Si tienes menos tiempo</div><div class="alt-plan__text">${esc(alt.less_time)}</div></div>` : ''}
        ${alt.rainy_day ? `<div class="alt-plan"><div class="alt-plan__label">Si llueve</div><div class="alt-plan__text">${esc(alt.rainy_day)}</div></div>` : ''}
        ${alt.with_kids ? `<div class="alt-plan"><div class="alt-plan__label">Con niños</div><div class="alt-plan__text">${esc(alt.with_kids)}</div></div>` : ''}
      </div>` : '';

    const info = d.info || {};
    const infoHTML = [
      info.travel_tips ? { t: '💡 Consejos', items: info.travel_tips } : null,
      info.access ? { t: '🎟 Acceso', items: info.access } : null,
      info.facts ? { t: '📊 Datos de interés', items: info.facts } : null
    ].filter(Boolean).map(b => `
      <div class="info-block">
        <div class="info-block__title">${esc(b.t)}</div>
        <ul class="info-block__list">${b.items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
      </div>`).join('');

    const log = d.logistics || {};
    const logisticsHTML = (log.driving_km || log.walking_km || log.public_transport) ? `
      <div class="day-detail__logistics">
        ${log.driving_km ? `<span class="day-detail__logistics-item">🚗 ${log.driving_km} km · ${Math.round((log.driving_time_min||0)/60*10)/10}h</span>` : ''}
        ${log.walking_km ? `<span class="day-detail__logistics-item">🚶 ${log.walking_km} km · ${Math.round((log.walking_time_min||0)/60*10)/10}h</span>` : ''}
        ${log.public_transport ? `<span class="day-detail__logistics-item">🚌 ${esc(log.public_transport)}</span>` : ''}
      </div>` : '';

    const noteKey = `d${d.day}`;
    const noteVal = store.notes[noteKey] || '';

    el('#page-day').innerHTML = `
      <div class="day-detail__head">
        <button class="back-btn" onclick="window.__nav.go('days')">← Volver al itinerario</button>
        <div class="day-detail__eyebrow">Día ${d.day} — ${fmtDate(d.date, { weekday: 'long', day: 'numeric', month: 'long' })}</div>
        <h1 class="day-detail__title">${esc(d.title)}</h1>
        ${logisticsHTML}
      </div>

      <div class="timeline">${timelineHTML}</div>

      ${placesHTML ? `<h3 class="section-title section-title--small">🏛 Lugares del día</h3>${placesHTML}` : ''}

      ${restaurantsHTML}
      ${altHTML}
      ${infoHTML}

      <div class="day-notes">
        <div class="day-notes__label">📝 Tus notas del día</div>
        <textarea class="day-notes__textarea" id="note-input" placeholder="Impresiones, fotos tomadas, gastos del día…">${esc(noteVal)}</textarea>
      </div>

      <div class="day-nav">
        ${d.day > 1 ? `<button class="day-nav__btn day-nav__btn--prev" onclick="window.__nav.goDay(${d.day - 1})">← Día ${d.day - 1}</button>` : '<div></div>'}
        ${d.day < DATA.days.length ? `<button class="day-nav__btn day-nav__btn--next" onclick="window.__nav.goDay(${d.day + 1})">Día ${d.day + 1} →</button>` : '<div></div>'}
      </div>
    `;

    el('#note-input').addEventListener('input', (e) => {
      store.notes[noteKey] = e.target.value;
      saveStore();
    });

    el('#header-title').textContent = `Día ${d.day} · ${d.title}`;
  }

  // --- MAP ------------------------------------------------
  let mapInstance = null;
  let mapLoadAttempts = 0;
  function renderMap() {
    if (!window.L) {
      mapLoadAttempts++;
      if (mapLoadAttempts > 20) {  // ~4 segundos
        el('#map').innerHTML = `<div class="empty-state" style="padding:40px 20px">
          🗺️ <br><br>
          <strong>Mapa no disponible</strong><br>
          <span style="font-size:13px">Este archivo necesita conexión para cargar los mapas.<br>Los datos del itinerario siguen disponibles en las otras pestañas.</span>
        </div>`;
        return;
      }
      setTimeout(renderMap, 200);
      return;
    }
    const om = DATA.overview_map;
    if (!om) { el('#map').innerHTML = '<p style="padding:20px">Sin datos de mapa.</p>'; return; }

    try {
      if (mapInstance) { mapInstance.remove(); mapInstance = null; }

      mapInstance = L.map('map', { zoomControl: true, attributionControl: true })
        .setView([om.center.lat, om.center.lng], om.zoom || 8);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(mapInstance);

      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

      (om.markers || []).forEach(m => {
        const icon = L.divIcon({
          className: 'custom-marker',
          html: `<div style="width:30px;height:30px;background:${accent};color:#fff;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:2px solid #fff">${m.day}</div>`,
          iconSize: [30, 30],
          iconAnchor: [15, 15]
        });
        L.marker([m.coords.lat, m.coords.lng], { icon })
          .addTo(mapInstance)
          .bindPopup(`<strong>${esc(m.name)}</strong><br><small>Día ${m.day}</small><br><a href="#" onclick="window.__nav.goDay(${m.day});return false;">Ver día →</a>`);
      });
    } catch (err) {
      console.error('Error al inicializar el mapa:', err);
      el('#map').innerHTML = `<div class="empty-state" style="padding:40px 20px">
        ⚠️ Error al cargar el mapa.<br>
        <small>${esc(err.message || 'Desconocido')}</small>
      </div>`;
    }
  }

  // --- TIPS -----------------------------------------------
  function renderTips() {
    // Separar los tips normales de los que son de apps (para fusionarlos con apps_recommended)
    const appKeywords = ['app', 'apps', 'aplicacion', 'aplicaciones'];
    const isAppGroup = (g) => appKeywords.some(kw => g.title.toLowerCase().includes(kw));

    const normalTips = (DATA.practical_tips || []).filter(g => !isAppGroup(g));
    const appTipGroups = (DATA.practical_tips || []).filter(g => isAppGroup(g));

    // Fusionar items de apps de practical_tips + apps_recommended en un solo grupo
    const appItems = [];
    appTipGroups.forEach(g => {
      (g.items || []).forEach(i => appItems.push(i));
    });
    // Añadir apps_recommended como items adicionales (evitando duplicados por nombre)
    const existingNames = new Set(appItems.map(i => i.subtitle.toLowerCase()));
    (DATA.apps_recommended || []).forEach(a => {
      if (!existingNames.has(a.name.toLowerCase())) {
        appItems.push({ subtitle: a.name, text: a.purpose });
      }
    });

    let tipIdx = 0;

    const normalHTML = normalTips.map(g => {
      const id = tipIdx++;
      return `
      <div class="tip-group" id="tip-group-${id}">
        <button class="tip-group__head" onclick="document.getElementById('tip-group-${id}').classList.toggle('is-open')">
          <div class="tip-group__head-left">
            <span class="tip-group__icon">${esc(g.icon)}</span>
            <span class="tip-group__title">${esc(g.title)}</span>
          </div>
          <span class="chev">▾</span>
        </button>
        <div class="tip-group__body">
          ${(g.items || []).map(i => `
            <div class="tip-item">
              <div class="tip-item__subtitle">${esc(i.subtitle)}</div>
              <div class="tip-item__text">${esc(i.text)}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');

    // Emergencias como grupo desplegable
    const em = DATA.emergency || {};
    const emergencyItems = [
      em.local_emergency ? { subtitle: 'Emergencias general', text: em.local_emergency } : null,
      em.medical ? { subtitle: 'Médico / ambulancias', text: em.medical } : null,
      em.police ? { subtitle: 'Policía', text: em.police } : null,
      em.embassy ? { subtitle: 'Embajada / consulado', text: em.embassy } : null,
      em.insurance_reminder ? { subtitle: 'Seguro de viaje', text: em.insurance_reminder } : null
    ].filter(Boolean);

    let emergencyHTML = '';
    if (emergencyItems.length > 0) {
      const emId = tipIdx++;
      emergencyHTML = `
      <div class="tip-group" id="tip-group-${emId}">
        <button class="tip-group__head" onclick="document.getElementById('tip-group-${emId}').classList.toggle('is-open')">
          <div class="tip-group__head-left">
            <span class="tip-group__icon">🆘</span>
            <span class="tip-group__title">Emergencias</span>
          </div>
          <span class="chev">▾</span>
        </button>
        <div class="tip-group__body">
          ${emergencyItems.map(i => `
            <div class="tip-item">
              <div class="tip-item__subtitle">${esc(i.subtitle)}</div>
              <div class="tip-item__text">${esc(i.text)}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }

    // Apps unificadas como grupo desplegable
    let appsHTML = '';
    if (appItems.length > 0) {
      const appsId = tipIdx++;
      appsHTML = `
      <div class="tip-group" id="tip-group-${appsId}">
        <button class="tip-group__head" onclick="document.getElementById('tip-group-${appsId}').classList.toggle('is-open')">
          <div class="tip-group__head-left">
            <span class="tip-group__icon">📱</span>
            <span class="tip-group__title">Apps recomendadas</span>
          </div>
          <span class="chev">▾</span>
        </button>
        <div class="tip-group__body">
          ${appItems.map(i => `
            <div class="tip-item">
              <div class="tip-item__subtitle">${esc(i.subtitle)}</div>
              <div class="tip-item__text">${esc(i.text)}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }

    el('#page-tips').innerHTML = `
      <h2 class="section-title" style="margin-top:0">Consejos prácticos</h2>
      ${normalHTML}
      ${emergencyHTML}
      ${appsHTML}
    `;
  }

  // --- ME (checklist, presupuesto, packing, herramientas) --
  function totalExpenses() {
    return store.expenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
  }
  function overallProgress() {
    const allKeys = DATA.days.flatMap(d => (d.timeline || []).map((_, idx) => `d${d.day}_t${idx}`));
    if (!allKeys.length) return 0;
    const done = allKeys.filter(k => store.checklist[k]).length;
    return Math.round((done / allKeys.length) * 100);
  }
  function packingProgress() {
    const groups = store.packing_custom || DATA.packing_list || {};
    let total = 0, done = 0;
    Object.keys(groups).forEach(cat => {
      (groups[cat] || []).forEach((_, idx) => {
        total++;
        if (store.packing[`${cat}_${idx}`]) done++;
      });
    });
    return total ? Math.round((done / total) * 100) : 0;
  }

  function renderMe() {
    const tabs = [
      { k: 'overview', l: 'Resumen' },
      { k: 'budget', l: 'Presupuesto' },
      { k: 'packing', l: 'Equipaje' },
      { k: 'tools', l: 'Herramientas' }
    ];

    el('#page-me').innerHTML = `
      <h2 class="section-title" style="margin-top:0">Mi viaje</h2>
      <div class="me-tabs">
        ${tabs.map(t => `<button class="me-tab ${t.k === 'overview' ? 'is-active' : ''}" data-me-tab="${t.k}">${t.l}</button>`).join('')}
      </div>
      <div class="me-pane is-active" data-me-pane="overview"></div>
      <div class="me-pane" data-me-pane="budget"></div>
      <div class="me-pane" data-me-pane="packing"></div>
      <div class="me-pane" data-me-pane="tools"></div>
    `;

    document.querySelectorAll('[data-me-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.me-tab').forEach(b => b.classList.remove('is-active'));
        document.querySelectorAll('.me-pane').forEach(p => p.classList.remove('is-active'));
        btn.classList.add('is-active');
        document.querySelector(`[data-me-pane="${btn.dataset.meTab}"]`).classList.add('is-active');
      });
    });

    renderMeOverview();
    renderMeBudget();
    renderMePacking();
    renderMeTools();
  }

  function renderMeOverview() {
    const progress = overallProgress();
    const packProg = packingProgress();
    const totalExp = totalExpenses();
    const bdKeys_ov = ['flights', 'accommodation', 'transport', 'food', 'activities', 'shopping', 'other'];
    const budget = store.budget_edit ? bdKeys_ov.reduce((s, k) => s + (store.budget_edit.breakdown[k] || 0), 0) : (DATA.meta.budget?.total_estimated || 0);
    const curr = DATA.meta.currency || 'EUR';

    const paneEl = document.querySelector('[data-me-pane="overview"]');
    if (!paneEl) return;

    paneEl.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__value">${progress}%</div>
          <div class="stat-card__label">Itinerario</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__value">${packProg}%</div>
          <div class="stat-card__label">Equipaje</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__value">${fmtMoney(totalExp, curr)}</div>
          <div class="stat-card__label">Gastado</div>
        </div>
      </div>

      <div class="tool-card">
        <div class="tool-card__title">📊 Presupuesto</div>
        <div class="budget-row">
          <span class="budget-row__label">Estimado</span>
          <span class="budget-row__value">${fmtMoney(budget, curr)}</span>
        </div>
        <div class="budget-row">
          <span class="budget-row__label">Gastado</span>
          <span class="budget-row__value">${fmtMoney(totalExp, curr)}</span>
        </div>
        <div class="budget-progress">
          <div class="budget-progress__fill ${totalExp > budget ? 'is-over' : ''}" style="width:${Math.min(100, budget ? (totalExp/budget)*100 : 0)}%"></div>
        </div>
        <div class="budget-row" style="margin-top:10px">
          <span class="budget-row__label">Restante</span>
          <span class="budget-row__value" style="color:${totalExp > budget ? 'var(--c-danger)' : 'var(--c-success)'}">${fmtMoney(budget - totalExp, curr)}</span>
        </div>
      </div>

      <div class="tool-card">
        <div class="tool-card__title">☁️ Clima en destino</div>
        <div id="weather-content" class="empty-state">Cargando…</div>
      </div>
    `;

    loadWeather();
  }

  async function loadWeather() {
    const w = document.getElementById('weather-content');
    if (!w) return;
    const om = DATA.overview_map;
    if (!om) { w.textContent = 'Sin coordenadas.'; return; }
    const start = DATA.meta.dates.start;
    const end = DATA.meta.dates.end;

    // Open-Meteo es gratis y no requiere API key
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${om.center.lat}&longitude=${om.center.lng}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&start_date=${start}&end_date=${end}`;

    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error('fetch failed');
      const j = await r.json();
      if (!j.daily) { w.textContent = 'Previsión fuera de rango.'; return; }

      const codes = {
        0: '☀️', 1: '🌤', 2: '⛅', 3: '☁️',
        45: '🌫', 48: '🌫',
        51: '🌦', 53: '🌦', 55: '🌦',
        61: '🌧', 63: '🌧', 65: '🌧',
        71: '🌨', 73: '🌨', 75: '🌨',
        80: '🌦', 81: '🌧', 82: '⛈',
        95: '⛈', 96: '⛈', 99: '⛈'
      };

      const daysHTML = j.daily.time.map((t, i) => `
        <div class="weather-day">
          <div class="weather-day__date">${fmtDate(t, { weekday: 'short', day: 'numeric' })}</div>
          <div class="weather-day__icon">${codes[j.daily.weather_code[i]] || '🌡'}</div>
          <div class="weather-day__temp">${Math.round(j.daily.temperature_2m_max[i])}° <span class="weather-day__temp-min">${Math.round(j.daily.temperature_2m_min[i])}°</span></div>
        </div>`).join('');
      w.outerHTML = `<div class="weather-grid" id="weather-content">${daysHTML}</div>`;
    } catch (e) {
      w.textContent = 'Sin conexión para clima.';
    }
  }

  function renderMeBudget() {
    const paneEl = document.querySelector('[data-me-pane="budget"]');
    if (!paneEl) return;
    const curr = DATA.meta.currency || 'EUR';

    // Inicializar desde DATA si no hay override guardado
    if (!store.budget_edit) {
      const bd = DATA.meta.budget?.breakdown || {};
      store.budget_edit = {
        breakdown: {
          flights: bd.flights || 0,
          accommodation: bd.accommodation || 0,
          transport: bd.transport || 0,
          food: bd.food || 0,
          activities: bd.activities || 0,
          shopping: bd.shopping || 0,
          other: bd.other || 0
        }
      };
    }
    // Inicializar gastos compartidos si no existe
    if (!store.split) {
      store.split = { people: [], expenses: [] };
    }

    const be = store.budget_edit;
    const bdLabels = { flights: 'Vuelos', accommodation: 'Alojamiento', transport: 'Transporte local', food: 'Comida', activities: 'Actividades', shopping: 'Compras', other: 'Otros' };
    const bdKeys = ['flights', 'accommodation', 'transport', 'food', 'activities', 'shopping', 'other'];
    // Total = suma de partidas (no editable directamente)
    const budgetTotal = bdKeys.reduce((sum, k) => sum + (be.breakdown[k] || 0), 0);
    const totalExp = totalExpenses();
    const categories = ['Transporte', 'Alojamiento', 'Comida', 'Actividades', 'Compras', 'Otros'];

    const budgetHTML = `
      <div class="budget-summary">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin:0 0 10px">Presupuesto estimado</div>
        ${bdKeys.map(k => `
          <div class="budget-row" style="margin-bottom:4px">
            <span class="budget-row__label" style="font-size:13px">${bdLabels[k]}</span>
            <div style="display:flex;align-items:center;gap:4px">
              <input type="number" data-bd-key="${k}" value="${be.breakdown[k] || 0}" style="width:75px;padding:5px 6px;border:1px solid var(--line);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;text-align:right">
              <span style="font-size:11px;color:var(--text-muted)">€</span>
            </div>
          </div>`).join('')}

        <hr class="divider" style="margin:12px 0 10px">
        <div class="budget-row">
          <span class="budget-row__label" style="font-weight:700">Total presupuestado</span>
          <span class="budget-row__value" id="budget-auto-total" style="font-size:20px">${fmtMoney(budgetTotal, curr)}</span>
        </div>
        <div class="budget-row" style="margin-top:6px">
          <span class="budget-row__label">Gastado</span>
          <span class="budget-row__value">${fmtMoney(totalExp, curr)}</span>
        </div>
        <div class="budget-progress">
          <div class="budget-progress__fill ${totalExp > budgetTotal ? 'is-over' : ''}" style="width:${Math.min(100, budgetTotal ? (totalExp/budgetTotal)*100 : 0)}%"></div>
        </div>
        <div class="budget-row" style="margin-top:6px">
          <span class="budget-row__label">Restante</span>
          <span class="budget-row__value" style="color:${totalExp > budgetTotal ? 'var(--c-danger)' : 'var(--c-success)'}">${fmtMoney(budgetTotal - totalExp, curr)}</span>
        </div>
      </div>

      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin:20px 0 8px">Añadir gasto</div>
      <div class="expense-form">
        <input id="exp-desc" placeholder="Concepto">
        <input id="exp-amount" type="number" step="0.01" placeholder="€">
        <select id="exp-cat">${categories.map(c => `<option>${c}</option>`).join('')}</select>
        <button id="exp-add">+</button>
      </div>
      <ul class="expense-list" id="exp-list">
        ${store.expenses.length === 0 ? '<li class="empty-state">Aún no has añadido gastos.</li>' : ''}
        ${store.expenses.slice().reverse().map(e => `
          <li class="expense-item">
            <div>
              <div class="expense-item__desc">${esc(e.desc)}</div>
              <div class="expense-item__cat">${esc(e.category)}</div>
            </div>
            <span class="expense-item__amount">${fmtMoney(e.amount, curr)}</span>
            <button class="expense-item__del" data-del="${e.id}">✕</button>
          </li>`).join('')}
      </ul>
    `;

    // --- Sección gastos compartidos ---
    const sp = store.split;
    const today = todayISO();

    // Calcular balances netos: para cada gasto, cada beneficiario debe su parte proporcional
    const balances = {}; // balance positivo = le deben, negativo = debe
    sp.people.forEach(p => { balances[p] = 0; });
    const splitGrandTotal = sp.expenses.reduce((s, e) => s + e.amount, 0);

    sp.expenses.forEach(e => {
      const beneficiaries = (e.forWhom && e.forWhom.length > 0) ? e.forWhom : sp.people;
      const share = e.amount / beneficiaries.length;
      // El pagador adelanta el total
      balances[e.paidBy] = (balances[e.paidBy] || 0) + e.amount;
      // Cada beneficiario "consume" su parte
      beneficiaries.forEach(b => {
        balances[b] = (balances[b] || 0) - share;
      });
    });

    // Calcular transferencias mínimas para liquidar
    function calcTransfers(bal) {
      const debtors = []; // deben dinero (balance negativo)
      const creditors = []; // les deben (balance positivo)
      Object.keys(bal).forEach(p => {
        const b = Math.round(bal[p] * 100) / 100;
        if (b < -0.01) debtors.push({ name: p, amount: -b });
        else if (b > 0.01) creditors.push({ name: p, amount: b });
      });
      // Ordenar de mayor a menor para minimizar transferencias
      debtors.sort((a,b) => b.amount - a.amount);
      creditors.sort((a,b) => b.amount - a.amount);

      const transfers = [];
      let di = 0, ci = 0;
      while (di < debtors.length && ci < creditors.length) {
        const pay = Math.min(debtors[di].amount, creditors[ci].amount);
        if (pay > 0.01) {
          transfers.push({ from: debtors[di].name, to: creditors[ci].name, amount: Math.round(pay * 100) / 100 });
        }
        debtors[di].amount -= pay;
        creditors[ci].amount -= pay;
        if (debtors[di].amount < 0.01) di++;
        if (creditors[ci].amount < 0.01) ci++;
      }
      return transfers;
    }

    const transfers = sp.expenses.length > 0 ? calcTransfers({...balances}) : [];

    // Cuánto ha pagado cada persona en total
    const totalPaid = {};
    sp.people.forEach(p => { totalPaid[p] = 0; });
    sp.expenses.forEach(e => { totalPaid[e.paidBy] = (totalPaid[e.paidBy] || 0) + e.amount; });

    // HTML de la sección
    const splitHTML = `
      <hr class="divider" style="margin:24px 0 16px">
      <div class="tool-card" style="border:2px solid var(--accent);border-radius:var(--radius)">
        <div class="tool-card__title">👥 Gastos compartidos</div>
        <p style="font-size:12.5px;color:var(--text-soft);margin-bottom:12px">Añade viajeros, registra quién paga cada gasto y para quién es. Al final del viaje, verás quién debe pagar a quién.</p>

        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:6px">Viajeros</div>
        <div id="split-people" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">
          ${sp.people.map((p, i) => `
            <span style="display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--bg-elev);border-radius:999px;font-size:13px;font-weight:600">
              ${esc(p)}
              <button data-rm-person="${i}" style="font-size:11px;color:var(--c-danger);opacity:0.6;cursor:pointer;background:none;border:none">✕</button>
            </span>`).join('')}
        </div>
        <div style="display:flex;gap:6px;margin-bottom:16px">
          <input id="split-new-person" placeholder="Nombre" style="flex:1;padding:7px 10px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px">
          <button id="split-add-person" class="btn btn--primary btn--sm">Añadir</button>
        </div>

        ${sp.people.length >= 2 ? `
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:6px">Registrar pago</div>
          <div style="display:grid;grid-template-columns:1fr 70px;gap:6px;margin-bottom:6px">
            <input id="split-desc" placeholder="Concepto" style="padding:7px 8px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;min-width:0">
            <input id="split-amount" type="number" step="0.01" placeholder="€" style="padding:7px 8px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px;margin-bottom:6px;align-items:center">
            <div>
              <label style="font-size:11px;color:var(--text-muted);font-weight:600">Pagó</label>
              <select id="split-who" style="width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;margin-top:2px">
                ${sp.people.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="font-size:11px;color:var(--text-muted);font-weight:600">Fecha</label>
              <input id="split-date" type="date" value="${today}" style="width:100%;padding:7px 8px;border:1px solid var(--line);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;margin-top:2px">
            </div>
            <button id="split-add-exp" class="btn btn--primary btn--sm" style="align-self:end;margin-bottom:1px">+</button>
          </div>
          <div style="margin-bottom:12px">
            <label style="font-size:11px;color:var(--text-muted);font-weight:600">¿Para quién es este gasto?</label>
            <div id="split-for-whom" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
              ${sp.people.map(p => `
                <label style="display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:var(--bg-elev);border-radius:999px;font-size:12px;cursor:pointer;user-select:none">
                  <input type="checkbox" value="${esc(p)}" checked style="accent-color:var(--accent);width:14px;height:14px">
                  ${esc(p)}
                </label>`).join('')}
            </div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:3px">Por defecto, todos seleccionados = gasto del grupo.</div>
          </div>

          ${sp.expenses.length > 0 ? `
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin:12px 0 6px">Historial de pagos</div>
            <ul class="expense-list" style="margin-bottom:12px">
              ${sp.expenses.slice().reverse().map((e, ri) => {
                const idx = sp.expenses.length - 1 - ri;
                const forLabel = (e.forWhom && e.forWhom.length > 0 && e.forWhom.length < sp.people.length)
                  ? e.forWhom.join(', ')
                  : 'todos';
                return `
                <li class="expense-item" style="grid-template-columns:1fr auto auto">
                  <div>
                    <div class="expense-item__desc">${esc(e.desc)}</div>
                    <div class="expense-item__cat">Pagó: ${esc(e.paidBy)} · Para: ${esc(forLabel)} · ${esc(e.date || '')}</div>
                  </div>
                  <span class="expense-item__amount">${fmtMoney(e.amount, curr)}</span>
                  <button class="expense-item__del" data-del-split="${idx}">✕</button>
                </li>`;
              }).join('')}
            </ul>

            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin:12px 0 8px">Resumen</div>
            <div style="background:var(--bg-elev);border-radius:var(--radius);padding:12px 14px">
              <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px;color:var(--text-soft)">
                <span>Gasto total del grupo</span>
                <span style="font-weight:700;color:var(--text)">${fmtMoney(splitGrandTotal, curr)}</span>
              </div>
              <hr class="divider" style="margin:6px 0 8px">
              ${sp.people.map(p => {
                const paid = totalPaid[p] || 0;
                const bal = Math.round((balances[p] || 0) * 100) / 100;
                const color = bal >= 0 ? 'var(--c-success)' : 'var(--c-danger)';
                const label = bal > 0.01 ? `le deben ${fmtMoney(bal, curr)}` : bal < -0.01 ? `debe ${fmtMoney(-bal, curr)}` : 'saldado ✓';
                return `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13px">
                  <div>
                    <span style="font-weight:700">${esc(p)}</span>
                    <span style="color:var(--text-muted)"> · pagó ${fmtMoney(paid, curr)}</span>
                  </div>
                  <span style="font-weight:700;color:${color}">${label}</span>
                </div>`;
              }).join('')}

              ${transfers.length > 0 ? `
                <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin:14px 0 6px">💸 Para liquidar</div>
                ${transfers.map(t => `
                  <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px dashed var(--line)">
                    <span><strong>${esc(t.from)}</strong> paga a <strong>${esc(t.to)}</strong></span>
                    <span style="font-weight:700;color:var(--accent)">${fmtMoney(t.amount, curr)}</span>
                  </div>`).join('')}
              ` : ''}
            </div>
          ` : '<div class="empty-state" style="padding:16px 0">Añade un pago para ver el resumen.</div>'}
        ` : sp.people.length === 1 ? '<p style="font-size:13px;color:var(--text-muted)">Añade al menos 2 viajeros para usar los gastos compartidos.</p>' : ''}
      </div>
    `;

    paneEl.innerHTML = budgetHTML + splitHTML;

    // --- Listeners para partidas del presupuesto ---
    document.querySelectorAll('[data-bd-key]').forEach(inp => {
      inp.addEventListener('change', () => {
        store.budget_edit.breakdown[inp.dataset.bdKey] = parseFloat(inp.value) || 0;
        saveStore();
        const newTotal = bdKeys.reduce((s, k) => s + (store.budget_edit.breakdown[k] || 0), 0);
        const totalEl = document.getElementById('budget-auto-total');
        if (totalEl) totalEl.textContent = fmtMoney(newTotal, curr);
        renderMeOverview();
      });
    });

    // --- Listeners para gastos personales ---
    document.getElementById('exp-add').addEventListener('click', () => {
      const desc = document.getElementById('exp-desc').value.trim();
      const amount = parseFloat(document.getElementById('exp-amount').value);
      const category = document.getElementById('exp-cat').value;
      if (!desc || !amount || isNaN(amount)) return;
      store.expenses.push({ id: 'e_' + Date.now(), desc, amount, category, date: todayISO() });
      saveStore();
      renderMeBudget();
      renderMeOverview();
    });
    document.querySelectorAll('[data-del]').forEach(b => {
      b.addEventListener('click', () => {
        store.expenses = store.expenses.filter(e => e.id !== b.dataset.del);
        saveStore();
        renderMeBudget();
        renderMeOverview();
      });
    });

    // --- Listeners para gastos compartidos ---
    const addPersonBtn = document.getElementById('split-add-person');
    const newPersonInp = document.getElementById('split-new-person');
    if (addPersonBtn) {
      const doAddPerson = () => {
        const name = newPersonInp.value.trim();
        if (!name || store.split.people.includes(name)) return;
        store.split.people.push(name);
        saveStore();
        renderMeBudget();
      };
      addPersonBtn.addEventListener('click', doAddPerson);
      newPersonInp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doAddPerson(); } });
    }

    document.querySelectorAll('[data-rm-person]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.rmPerson);
        const removed = store.split.people[idx];
        store.split.people.splice(idx, 1);
        store.split.expenses = store.split.expenses.filter(e => e.paidBy !== removed);
        // También limpiar de forWhom
        store.split.expenses.forEach(e => {
          if (e.forWhom) e.forWhom = e.forWhom.filter(p => p !== removed);
        });
        saveStore();
        renderMeBudget();
      });
    });

    const addSplitBtn = document.getElementById('split-add-exp');
    if (addSplitBtn) {
      addSplitBtn.addEventListener('click', () => {
        const desc = document.getElementById('split-desc').value.trim();
        const amount = parseFloat(document.getElementById('split-amount').value);
        const who = document.getElementById('split-who').value;
        const date = document.getElementById('split-date').value || todayISO();
        // Leer beneficiarios seleccionados
        const checkboxes = document.querySelectorAll('#split-for-whom input[type="checkbox"]');
        const forWhom = [];
        checkboxes.forEach(cb => { if (cb.checked) forWhom.push(cb.value); });
        if (!desc || !amount || isNaN(amount) || !who || forWhom.length === 0) {
          if (forWhom.length === 0) alert('Selecciona al menos una persona como beneficiario del gasto.');
          return;
        }
        store.split.expenses.push({ desc, amount, paidBy: who, forWhom, date });
        saveStore();
        renderMeBudget();
      });
    }

    document.querySelectorAll('[data-del-split]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.delSplit);
        store.split.expenses.splice(idx, 1);
        saveStore();
        renderMeBudget();
      });
    });
  }

  function getPackingData() {
    // Si el usuario ha editado, usa la copia custom. Si no, parte de DATA.
    if (store.packing_custom) return JSON.parse(JSON.stringify(store.packing_custom));
    return JSON.parse(JSON.stringify(DATA.packing_list || {}));
  }
  function savePackingData(pl) {
    store.packing_custom = pl;
    saveStore();
  }

  function renderMePacking() {
    const paneEl = document.querySelector('[data-me-pane="packing"]');
    if (!paneEl) return;
    const pl = getPackingData();
    const labels = {
      summer_clothing: '☀️ Ropa de verano', winter_clothing: '🧥 Ropa de invierno',
      footwear: '👟 Calzado', underwear: '🩲 Ropa interior', items: '🎒 Objetos',
      accessories: '🧢 Complementos', documents: '📄 Documentación',
      toiletries: '🧴 Bolsa de aseo', health: '💊 Salud', other: '📦 Otros',
      clothing: '👕 Ropa', tech: '🔌 Tecnología'
    };
    const preferredOrder = [
      'summer_clothing', 'winter_clothing', 'clothing', 'footwear', 'underwear',
      'items', 'tech', 'accessories', 'documents', 'toiletries', 'health', 'other'
    ];
    const orderedKeys = preferredOrder.filter(k => pl[k] && pl[k].length > 0).concat(
      Object.keys(pl).filter(k => !preferredOrder.includes(k) && pl[k] && pl[k].length > 0)
    );

    if (orderedKeys.length === 0) {
      paneEl.innerHTML = '<div class="empty-state">Sin lista de equipaje definida.</div>';
      return;
    }

    paneEl.innerHTML = orderedKeys.map(cat => `
      <div class="packing-group" data-cat="${cat}">
        <div class="packing-group__title">${labels[cat] || '📦 ' + cat}</div>
        ${(pl[cat] || []).map((item, idx) => {
          const key = `${cat}_${idx}`;
          const packed = !!store.packing[key];
          return `
            <div class="packing-item ${packed ? 'is-packed' : ''}" data-pack-key="${key}" data-cat="${cat}" data-idx="${idx}">
              <span class="packing-item__box" data-action="toggle"></span>
              <input class="packing-item__edit" type="text" value="${esc(item)}" data-action="rename">
              <button class="packing-item__remove" data-action="remove" title="Eliminar">✕</button>
            </div>`;
        }).join('')}
        <div class="packing-add-row">
          <input class="packing-add-input" data-add-cat="${cat}" placeholder="Añadir item…" type="text">
          <button class="packing-add-btn" data-add-btn="${cat}">+</button>
        </div>
      </div>`).join('') + `
      <div style="margin-top:12px">
        <button class="btn btn--ghost btn--sm" id="packing-reset" style="font-size:12px">↩ Restaurar lista original</button>
      </div>`;

    // Toggle check
    paneEl.querySelectorAll('[data-action="toggle"]').forEach(box => {
      box.addEventListener('click', () => {
        const item = box.closest('[data-pack-key]');
        const k = item.dataset.packKey;
        store.packing[k] = !store.packing[k];
        saveStore();
        item.classList.toggle('is-packed');
        renderMeOverview();
      });
    });

    // Rename inline
    paneEl.querySelectorAll('[data-action="rename"]').forEach(inp => {
      inp.addEventListener('change', () => {
        const item = inp.closest('[data-pack-key]');
        const cat = item.dataset.cat;
        const idx = parseInt(item.dataset.idx);
        const plData = getPackingData();
        if (plData[cat] && plData[cat][idx] !== undefined) {
          plData[cat][idx] = inp.value.trim() || plData[cat][idx];
          savePackingData(plData);
        }
      });
    });

    // Remove item
    paneEl.querySelectorAll('[data-action="remove"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('[data-pack-key]');
        const cat = item.dataset.cat;
        const idx = parseInt(item.dataset.idx);
        const plData = getPackingData();
        if (plData[cat]) {
          plData[cat].splice(idx, 1);
          // Also clean packing checks for this category (re-index)
          const newPacking = {};
          Object.keys(store.packing).forEach(k => {
            if (!k.startsWith(cat + '_')) newPacking[k] = store.packing[k];
          });
          (plData[cat] || []).forEach((_, i) => {
            // preserve check state by old position if possible
          });
          store.packing = newPacking;
          savePackingData(plData);
          renderMePacking();
          renderMeOverview();
        }
      });
    });

    // Add item
    paneEl.querySelectorAll('[data-add-btn]').forEach(btn => {
      const cat = btn.dataset.addBtn;
      const inp = paneEl.querySelector(`[data-add-cat="${cat}"]`);
      const doAdd = () => {
        const val = inp.value.trim();
        if (!val) return;
        const plData = getPackingData();
        if (!plData[cat]) plData[cat] = [];
        plData[cat].push(val);
        savePackingData(plData);
        inp.value = '';
        renderMePacking();
        renderMeOverview();
      };
      btn.addEventListener('click', doAdd);
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doAdd(); } });
    });

    // Reset to original
    document.getElementById('packing-reset')?.addEventListener('click', () => {
      if (confirm('¿Restaurar la lista original? Se perderán los cambios que hayas hecho.')) {
        store.packing_custom = null;
        store.packing = {};
        saveStore();
        renderMePacking();
        renderMeOverview();
      }
    });
  }

  function renderMeTools() {
    const paneEl = document.querySelector('[data-me-pane="tools"]');
    if (!paneEl) return;

    // Detectar moneda local del destino: primero local_currency, luego currency si no es EUR, luego nada
    const homeCurr = 'EUR';
    const rawCurr = DATA.meta.local_currency || DATA.meta.currency || 'EUR';
    const destCurr = rawCurr === homeCurr ? null : rawCurr;

    const converterHTML = !destCurr ? '' : `
      <div class="tool-card">
        <div class="tool-card__title">💱 Conversor EUR ↔ ${esc(destCurr)}</div>

        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em">EUR → ${esc(destCurr)}</div>
        <div class="tool-card__row" style="margin-bottom:4px">
          <input id="conv-eur" type="number" placeholder="Euros" value="100">
          <div style="align-self:center;font-weight:700;font-size:14px;color:var(--accent)">EUR</div>
        </div>
        <div class="tool-card__result" id="conv-result-fwd">—</div>

        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin:12px 0 4px;text-transform:uppercase;letter-spacing:0.06em">${esc(destCurr)} → EUR</div>
        <div class="tool-card__row" style="margin-bottom:4px">
          <input id="conv-local" type="number" placeholder="${esc(destCurr)}" value="">
          <div style="align-self:center;font-weight:700;font-size:14px;color:var(--accent)">${esc(destCurr)}</div>
        </div>
        <div class="tool-card__result" id="conv-result-rev">—</div>

        <small id="conv-rate" style="display:block;margin-top:8px;color:var(--text-muted);font-size:11px"></small>
      </div>`;

    paneEl.innerHTML = `
      ${converterHTML}

      <div class="tool-card">
        <div class="tool-card__title">📤 Compartir esta guía</div>
        <p style="font-size:13px;color:var(--text-soft);margin-bottom:12px">Comparte el enlace de tu guía por WhatsApp, email o redes sociales.</p>
        <button class="btn btn--primary" onclick="navigator.share ? navigator.share({title: document.title, text: 'Mira mi guía de viaje', url: location.href}).catch(()=>{}) : alert('Copia la URL del navegador y compártela')">Compartir</button>
      </div>
    `;

    if (destCurr) {
      const eurInput = document.getElementById('conv-eur');
      const localInput = document.getElementById('conv-local');
      const resFwd = document.getElementById('conv-result-fwd');
      const resRev = document.getElementById('conv-result-rev');
      const rateEl = document.getElementById('conv-rate');
      let cachedRate = null;

      async function fetchRate() {
        if (cachedRate) return cachedRate;
        // Intentar con open.er-api.com (gratis, sin key, fiable)
        try {
          const r = await fetch('https://open.er-api.com/v6/latest/EUR');
          const j = await r.json();
          if (j.result === 'success' && j.rates && j.rates[destCurr]) {
            cachedRate = j.rates[destCurr];
            rateEl.textContent = '1 EUR = ' + cachedRate.toFixed(4) + ' ' + destCurr + ' (actualizado ' + (j.time_last_update_utc || 'hoy').split(' ').slice(0,4).join(' ') + ')';
            return cachedRate;
          }
        } catch (e) {}
        // Fallback: exchangerate.host
        try {
          const r2 = await fetch('https://api.exchangerate.host/latest?base=EUR&symbols=' + destCurr);
          const j2 = await r2.json();
          if (j2.rates && j2.rates[destCurr]) {
            cachedRate = j2.rates[destCurr];
            rateEl.textContent = '1 EUR = ' + cachedRate.toFixed(4) + ' ' + destCurr;
            return cachedRate;
          }
        } catch (e) {}
        rateEl.textContent = 'Sin conexión para obtener tasas';
        return null;
      }

      async function convertFwd() {
        const a = parseFloat(eurInput.value) || 0;
        const rate = await fetchRate();
        if (rate) {
          const result = a * rate;
          resFwd.textContent = new Intl.NumberFormat('es-ES', { maximumFractionDigits: 0 }).format(result) + ' ' + destCurr;
        } else {
          resFwd.textContent = 'Error';
        }
      }
      async function convertRev() {
        const a = parseFloat(localInput.value) || 0;
        const rate = await fetchRate();
        if (rate) {
          const result = a / rate;
          resRev.textContent = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 2 }).format(result);
        } else {
          resRev.textContent = 'Error';
        }
      }

      eurInput.addEventListener('input', convertFwd);
      localInput.addEventListener('input', convertRev);
      convertFwd();
    }
  }

  // ------------------------------------------------------
  // 5. ACCIONES GLOBALES
  // ------------------------------------------------------
  window.__actions = {
    toggleChecklist(key) {
      store.checklist[key] = !store.checklist[key];
      saveStore();
      const item = document.querySelector(`[data-key="${key}"]`);
      if (item) item.classList.toggle('is-done');
    }
  };

  // ------------------------------------------------------
  // 6. NAVEGACIÓN
  // ------------------------------------------------------
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('is-active'));
    el('#page-' + id).classList.add('is-active');
    window.scrollTo(0, 0);

    document.querySelectorAll('.tabbar__item').forEach(b => {
      b.classList.toggle('is-active', b.dataset.tab === id || (id === 'day' && b.dataset.tab === 'days'));
    });

    // (Re)renderizar contenido según la página
    switch (id) {
      case 'home': renderHome(); break;
      case 'days': renderDaysList(); el('#header-title').textContent = 'Itinerario'; break;
      case 'map':  renderMap(); el('#header-title').textContent = 'Mapa'; break;
      case 'tips': renderTips(); el('#header-title').textContent = 'Consejos'; break;
      case 'me':   renderMe(); el('#header-title').textContent = 'Mi viaje'; break;
    }
  }

  window.__nav = {
    go(id) { showPage(id); },
    goDay(n) { renderDay(n); showPage('day'); }
  };

  document.querySelectorAll('.tabbar__item').forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.tab));
  });

  // ------------------------------------------------------
  // 7. BUSCADOR GLOBAL
  // ------------------------------------------------------
  function buildSearchIndex() {
    const idx = [];
    DATA.days.forEach(d => {
      idx.push({ type: 'Día', title: `Día ${d.day}: ${d.title}`, snippet: DATA.summary.find(s => s.day === d.day)?.summary || '', action: () => window.__nav.goDay(d.day) });
      (d.timeline || []).forEach(t => idx.push({ type: `Día ${d.day}`, title: `${t.time} · ${t.title}`, snippet: t.description, action: () => window.__nav.goDay(d.day) }));
      (d.places || []).forEach(p => idx.push({ type: `Día ${d.day} · Lugar`, title: p.name, snippet: p.review || '', action: () => window.__nav.goDay(d.day) }));
      (d.restaurants || []).forEach(r => idx.push({ type: `Día ${d.day} · Restaurante`, title: r.name, snippet: r.speciality || '', action: () => window.__nav.goDay(d.day) }));
    });
    (DATA.practical_tips || []).forEach(g => {
      (g.items || []).forEach(i => idx.push({ type: `Consejo · ${g.title}`, title: i.subtitle, snippet: i.text, action: () => window.__nav.go('tips') }));
    });
    return idx;
  }

  const searchIndex = buildSearchIndex();
  const searchOverlay = el('#search-overlay');
  const searchInput = el('#search-input');
  const searchResults = el('#search-results');

  el('#btn-search').addEventListener('click', () => {
    searchOverlay.classList.add('is-open');
    searchInput.value = '';
    searchResults.innerHTML = '';
    setTimeout(() => searchInput.focus(), 60);
  });
  el('#search-close').addEventListener('click', () => searchOverlay.classList.remove('is-open'));

  function normalize(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

  searchInput.addEventListener('input', () => {
    const q = normalize(searchInput.value.trim());
    if (q.length < 2) { searchResults.innerHTML = ''; return; }
    const matches = searchIndex
      .map(it => ({ it, score: (normalize(it.title).includes(q) ? 2 : 0) + (normalize(it.snippet).includes(q) ? 1 : 0) }))
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0, 30);
    searchResults.innerHTML = matches.length
      ? matches.map((m, i) => `
          <div class="search-result" data-sr="${i}">
            <div class="search-result__type">${esc(m.it.type)}</div>
            <div class="search-result__title">${esc(m.it.title)}</div>
            <div class="search-result__snippet">${esc(m.it.snippet)}</div>
          </div>`).join('')
      : '<div class="empty-state">Sin resultados.</div>';
    searchResults.querySelectorAll('[data-sr]').forEach(n => {
      n.addEventListener('click', () => {
        const m = matches[Number(n.dataset.sr)];
        searchOverlay.classList.remove('is-open');
        m.it.action();
      });
    });
  });

  // ------------------------------------------------------
  // 8. ARRANQUE
  // ------------------------------------------------------
  showPage('home');

})();
</script>
